name: AgentForge CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests/test_components.py -v --tb=short

      - name: Verify training smoke test (50 episodes)
        env:
          PYTHONPATH: .
        run: |
          python -c "
          from src.train import train
          result = train(episodes_override=50)
          assert len(result['episode_rewards']) == 50, 'Training loop did not complete 50 episodes'
          print('✅ Smoke test passed: 50 episodes completed successfully')
          "
